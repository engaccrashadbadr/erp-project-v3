<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - نظام تخطيط موارد المؤسسات</title>
    
    <!-- المكتبات الخارجية -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .app-hidden { display: none; }
    </style>
</head>
<body class="bg-slate-100">
    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="login-container">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-2">ERP System</h1>
            <p class="text-sm text-gray-500 text-center mb-6">تسجيل الدخول</p>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">اسم المستخدم</label>
                    <input type="text" id="login-username" class="w-full border rounded-lg p-2.5" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">كلمة المرور</label>
                    <input type="password" id="login-password" class="w-full border rounded-lg p-2.5" required>
                </div>
                <p id="login-error" class="text-red-500 text-sm hidden"></p>
                <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700">دخول</button>
            </form>
        </div>
    </div>

    <!-- التطبيق الرئيسي (مخفي حتى تسجيل الدخول) -->
    <div id="app-main" class="app-hidden flex h-screen overflow-hidden">
        <!-- الشريط الجانبي (سيتم بناؤه ديناميكياً حسب الصلاحيات) -->
        <aside class="sidebar w-64 bg-[#0f172a] text-white flex flex-col flex-shrink-0">
            <div class="p-5 text-center border-b border-slate-700/50">
                <h1 class="text-xl font-extrabold tracking-wide">ERP System</h1>
                <p class="text-xs text-slate-400 mt-1">نظام تخطيط موارد المؤسسات</p>
                <p class="text-[10px] text-slate-500 mt-0.5">الإصدار 3.5.0 © 2026</p>
            </div>
            <nav id="sidebar-nav" class="flex-1 mt-4 px-3 space-y-1 overflow-y-auto">
                <!-- الأزرار ستُبنى هنا حسب الصلاحيات -->
            </nav>
            <div class="p-3 border-t border-slate-700/50 flex justify-between items-center">
                <span id="sidebar-username" class="text-sm"></span>
                <button id="logout-btn" class="text-red-400 hover:text-red-300 text-sm">خروج</button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm z-10 p-3 px-5 flex justify-between items-center border-b border-gray-200 no-print">
                <h2 id="section-title" class="text-lg font-bold text-gray-800">لوحة التحكم</h2>
                <div class="flex items-center gap-3">
                    <span id="current-date" class="text-sm text-gray-500"></span>
                    <div class="h-9 w-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white shadow"><i data-lucide="user" size="17"></i></div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-5" id="main-content">
                <!-- الأقسام ستُضاف هنا ديناميكياً -->
                <section id="dynamic-section" class="space-y-5"></section>
            </div>
        </main>
    </div>

    <!-- نوافذ منبثقة (نفس السابق) -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <!-- محتوى النافذة يضاف ديناميكياً -->
    </div>
    <div id="statement-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <!-- مشابه -->
    </div>
    <div id="invoice-pdf-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <!-- مشابه -->
    </div>

    <script>
        // ---------- تهيئة التطبيق ----------
        const API_BASE = 'api/';
        let currentUser = null;
        let userPermissions = [];

        // عناصر DOM
        const loginScreen = document.getElementById('login-screen');
        const appMain = document.getElementById('app-main');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const sidebarNav = document.getElementById('sidebar-nav');
        const sectionTitle = document.getElementById('section-title');
        const dynamicSection = document.getElementById('dynamic-section');
        const sidebarUsername = document.getElementById('sidebar-username');

        // قائمة جميع الأقسام الممكنة مع أسمائها وملفاتها
        const sectionsConfig = {
            dashboard: { title: 'لوحة التحكم', file: 'js/modules/dashboard.js' },
            customers: { title: 'العملاء', file: 'js/modules/customers.js' },
            suppliers: { title: 'الموردين', file: 'js/modules/suppliers.js' },
            inventory: { title: 'المخزون', file: 'js/modules/inventory.js' },
            invoices: { title: 'الفواتير', file: 'js/modules/invoices.js' },
            payments: { title: 'السداد والتحصيل', file: 'js/modules/payments.js' },
            accounting: { title: 'القيود اليومية', file: 'js/modules/accounting.js' },
            chartOfAccounts: { title: 'شجرة الحسابات', file: 'js/modules/chartOfAccounts.js' },
            costs: { title: 'التكاليف والتقارير', file: 'js/modules/costs.js' },
            profit: { title: 'أرباح المنتجات', file: 'js/modules/profit.js' },
            financialStatements: { title: 'القوائم المالية', file: 'js/modules/financialStatements.js' },
            monthlyClosing: { title: 'الإقفال الشهري', file: 'js/modules/monthlyClosing.js' },
            backup: { title: 'النسخ والبيانات', file: 'js/modules/backup.js' }
        };

        // تحميل موديول عند الطلب (مع التخزين المؤقت)
        const loadedModules = {};
        async function loadModule(sectionId) {
            if (loadedModules[sectionId]) return loadedModules[sectionId];
            const config = sectionsConfig[sectionId];
            if (!config) throw new Error('قسم غير معروف');
            // تحميل السكربت ديناميكياً
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = config.file;
                script.onload = () => {
                    loadedModules[sectionId] = true;
                    resolve();
                };
                script.onerror = () => reject(new Error(`فشل تحميل ${config.file}`));
                document.head.appendChild(script);
            });
        }

        // عرض قسم معين
        async function showSection(sectionId) {
            if (!sectionId || !userPermissions.includes(sectionId)) {
                alert('غير مصرح لك بدخول هذا القسم');
                return;
            }
            // تحميل الموديول إذا لم يُحمّل
            try {
                await loadModule(sectionId);
            } catch (e) {
                alert(e.message);
                return;
            }
            // تحديث العنوان
            sectionTitle.textContent = sectionsConfig[sectionId]?.title || sectionId;
            // تفعيل الزر في الشريط الجانبي
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + sectionId);
            if (btn) btn.classList.add('active');
            // استدعاء دالة العرض الخاصة بالموديول (يجب أن يعرفها الموديول على window)
            const renderFuncName = 'render' + sectionId.charAt(0).toUpperCase() + sectionId.slice(1);
            if (typeof window[renderFuncName] === 'function') {
                // إفراغ المحتوى الديناميكي أولاً
                dynamicSection.innerHTML = '<div class="text-center py-10">جاري التحميل...</div>';
                // استدعاء دالة العرض (المسؤولة عن بناء الواجهة داخل dynamicSection)
                window[renderFuncName](dynamicSection);
            } else {
                dynamicSection.innerHTML = `<p class="text-red-500">الموديول ${sectionId} لا يحتوي على دالة عرض.</p>`;
            }
            lucide.createIcons();
        }

        // بناء أزرار الشريط الجانبي حسب الصلاحيات
        function buildSidebar() {
            sidebarNav.innerHTML = '';
            Object.keys(sectionsConfig).forEach(id => {
                if (userPermissions.includes(id)) {
                    const btn = document.createElement('button');
                    btn.className = 'sidebar-item w-full flex items-center p-2.5';
                    btn.id = 'btn-' + id;
                    btn.innerHTML = `<i data-lucide="${getIcon(id)}" class="ml-3" size="18"></i> ${sectionsConfig[id].title}`;
                    btn.onclick = () => showSection(id);
                    sidebarNav.appendChild(btn);
                }
            });
            lucide.createIcons();
        }

        function getIcon(sectionId) {
            const icons = {
                dashboard: 'layout-dashboard', customers: 'users', suppliers: 'truck',
                inventory: 'package', invoices: 'file-text', payments: 'credit-card',
                accounting: 'book-open', chartOfAccounts: 'git-branch', costs: 'pie-chart',
                profit: 'trending-up', financialStatements: 'file-bar-chart',
                monthlyClosing: 'calendar-check', backup: 'database'
            };
            return icons[sectionId] || 'circle';
        }

        // تسجيل الخروج
        async function logout() {
            await fetch(API_BASE + 'logout.php', { method: 'POST', credentials: 'include' });
            appMain.classList.add('app-hidden');
            loginScreen.classList.remove('app-hidden');
            currentUser = null;
            userPermissions = [];
        }

        // التحقق من الجلسة عند التحميل
        async function checkSession() {
            try {
                const res = await fetch(API_BASE + 'check.php', { credentials: 'include' });
                if (!res.ok) throw new Error('غير مصرح');
                const data = await res.json();
                currentUser = data.user;
                userPermissions = data.permissions;
                // عرض التطبيق
                loginScreen.classList.add('app-hidden');
                appMain.classList.remove('app-hidden');
                sidebarUsername.textContent = currentUser.username;
                buildSidebar();
                // عرض لوحة التحكم افتراضياً
                if (userPermissions.includes('dashboard')) {
                    showSection('dashboard');
                } else {
                    // عرض أول قسم مصرح به
                    const first = userPermissions[0];
                    if (first) showSection(first);
                }
            } catch (e) {
                // بقاء شاشة الدخول
                loginScreen.classList.remove('app-hidden');
                appMain.classList.add('app-hidden');
            }
        }

        // معالج تسجيل الدخول
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            loginError.classList.add('hidden');
            try {
                const res = await fetch(API_BASE + 'login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });
                const data = await res.json();
                if (!res.ok || data.error) {
                    loginError.textContent = data.error || 'فشل تسجيل الدخول';
                    loginError.classList.remove('hidden');
                } else {
                    // إعادة التحقق لتحميل الصلاحيات
                    await checkSession();
                }
            } catch (err) {
                loginError.textContent = 'تعذر الاتصال بالخادم';
                loginError.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', logout);

        // التاريخ الحالي
        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('ar-EG', { dateStyle: 'full' }).format(new Date());

        // بدء التحقق من الجلسة عند تحميل الصفحة
        checkSession();
    </script>
</body>
</html>
