<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - نظام تخطيط موارد المؤسسات</title>
    
    <!-- المكتبات الخارجية -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .app-hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100">

    <!-- شاشة تسجيل الدخول -->
    <div id="login-screen" class="login-container">
        <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
            <h1 class="text-2xl font-bold text-center mb-2">ERP System</h1>
            <p class="text-sm text-gray-500 text-center mb-6">تسجيل الدخول</p>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">اسم المستخدم</label>
                    <input type="text" id="login-username" class="w-full border rounded-lg p-2.5" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">كلمة المرور</label>
                    <input type="password" id="login-password" class="w-full border rounded-lg p-2.5" required>
                </div>
                <p id="login-error" class="text-red-500 text-sm hidden"></p>
                <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-700">دخول</button>
            </form>
        </div>
    </div>

    <!-- التطبيق الرئيسي (مخفي حتى تسجيل الدخول) -->
    <div id="app-main" class="flex h-screen overflow-hidden app-hidden">
        <!-- الشريط الجانبي -->
        <aside class="sidebar w-64 bg-[#0f172a] text-white flex flex-col flex-shrink-0">
            <div class="p-5 text-center border-b border-slate-700/50">
                <h1 class="text-xl font-extrabold tracking-wide">ERP System</h1>
                <p class="text-xs text-slate-400 mt-1">نظام تخطيط موارد المؤسسات</p>
                <p class="text-[10px] text-slate-500 mt-0.5">الإصدار 3.5.0 © 2026</p>
            </div>
            <nav id="sidebar-nav" class="flex-1 mt-4 px-3 space-y-1 overflow-y-auto">
                <!-- الأزرار تُبنى حسب الصلاحيات -->
            </nav>
            <div class="p-3 border-t border-slate-700/50 flex justify-between items-center">
                <span id="sidebar-username" class="text-sm"></span>
                <button id="logout-btn" class="text-red-400 hover:text-red-300 text-sm">خروج</button>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm z-10 p-3 px-5 flex justify-between items-center border-b border-gray-200 no-print">
                <h2 id="section-title" class="text-lg font-bold text-gray-800">لوحة التحكم</h2>
                <div class="flex items-center gap-3">
                    <span id="current-date" class="text-sm text-gray-500"></span>
                    <div class="h-9 w-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white shadow"><i data-lucide="user" size="17"></i></div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-5" id="main-content">
                <section id="dashboard" class="space-y-5"></section>
                <section id="customers" class="hidden"></section>
                <section id="suppliers" class="hidden"></section>
                <section id="inventory" class="hidden"></section>
                <section id="invoices" class="hidden"></section>
                <section id="payments" class="hidden"></section>
                <section id="accounting" class="hidden"></section>
                <section id="chartOfAccounts" class="hidden"></section>
                <section id="costs" class="hidden"></section>
                <section id="profit" class="hidden"></section>
                <section id="financialStatements" class="hidden"></section>
                <section id="monthlyClosing" class="hidden"></section>
                <section id="backup" class="hidden"></section>
                <section id="settings" class="hidden"></section>
            </div>
        </main>
    </div>

    <!-- النوافذ المنبثقة -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden" style="max-height:92vh;">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 sticky top-0"><h3 id="modal-title" class="font-bold text-lg">إضافة جديد</h3><button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" size="20"></i></button></div>
            <div id="modal-body" class="p-5 overflow-y-auto" style="max-height:60vh;"></div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-2"><button onclick="closeModal()" class="px-5 py-2.5 text-gray-600 hover:bg-gray-200 rounded-lg font-semibold">إلغاء</button><button id="modal-save-btn" class="btn-primary text-sm">حفظ</button></div>
        </div>
    </div>

    <div id="statement-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden" style="max-height:92vh;">
            <div class="p-4 border-b flex justify-between items-center bg-gradient-to-r from-blue-50 to-indigo-50 sticky top-0"><h3 id="statement-title" class="font-bold text-lg">كشف حساب</h3><button onclick="closeStatement()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" size="20"></i></button></div>
            <div id="statement-body" class="p-5 overflow-y-auto" style="max-height:60vh;"></div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-2"><button onclick="printStatement()" class="px-4 py-2 bg-blue-600 text-white rounded-lg flex items-center gap-2 no-print"><i data-lucide="printer" size="16"></i> طباعة</button><button onclick="closeStatement()" class="px-5 py-2 bg-slate-700 text-white rounded-lg">إغلاق</button></div>
        </div>
    </div>

    <div id="invoice-pdf-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden" style="max-height:92vh;">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 sticky top-0"><h3 class="font-bold text-lg">معاينة الفاتورة</h3><button onclick="closeInvoicePDF()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" size="20"></i></button></div>
            <div id="invoice-pdf-body" class="p-5 overflow-y-auto bg-white" style="max-height:60vh;"></div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-2"><button onclick="printInvoicePDF()" class="px-4 py-2 bg-blue-600 text-white rounded-lg flex items-center gap-2"><i data-lucide="printer" size="16"></i> طباعة / حفظ PDF</button><button onclick="closeInvoicePDF()" class="px-5 py-2 bg-slate-700 text-white rounded-lg">إغلاق</button></div>
        </div>
    </div>

    <script>
        // ========== الإعدادات الأساسية ==========
        const USERS_STORE_KEY = 'erp_users_db';
        const AUTH_KEY = 'erp_current_session';

        // تشفير كلمة المرور
        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // تصدير دوال المستخدمين للموديولات الأخرى
        window.ERP = {
            hashPassword,
            getUsersDB: () => JSON.parse(localStorage.getItem(USERS_STORE_KEY)) || [],
            saveUsersDB: (users) => localStorage.setItem(USERS_STORE_KEY, JSON.stringify(users)),
            USERS_STORE_KEY
        };

        // قاعدة بيانات التطبيق المخزنة محلياً (كما كانت)
        let db = JSON.parse(localStorage.getItem('erp_db_v3')) || {
            customers: [], suppliers: [], inventory: [], invoices: [], entries: [], costs: [], payments: [],
            chartOfAccounts: [], monthlyClosings: []
        };
        ['payments','invoices','entries','costs','chartOfAccounts','monthlyClosings'].forEach(k => { if (!db[k]) db[k] = []; });
        
        if (db.chartOfAccounts.length === 0) {
            db.chartOfAccounts = [
                { id: 1, code: '1', name: 'الأصول', type: 'asset', parentId: null },
                { id: 2, code: '1.1', name: 'النقدية', type: 'asset', parentId: 1 },
                { id: 3, code: '1.2', name: 'العملاء', type: 'asset', parentId: 1 },
                { id: 4, code: '1.3', name: 'المخزون', type: 'asset', parentId: 1 },
                { id: 5, code: '2', name: 'الخصوم', type: 'liability', parentId: null },
                { id: 6, code: '2.1', name: 'الموردين', type: 'liability', parentId: 5 },
                { id: 7, code: '2.2', name: 'قروض', type: 'liability', parentId: 5 },
                { id: 8, code: '3', name: 'حقوق الملكية', type: 'equity', parentId: null },
                { id: 9, code: '3.1', name: 'رأس المال', type: 'equity', parentId: 8 },
                { id: 10, code: '4', name: 'الإيرادات', type: 'revenue', parentId: null },
                { id: 11, code: '4.1', name: 'المبيعات', type: 'revenue', parentId: 10 },
                { id: 12, code: '5', name: 'المصروفات', type: 'expense', parentId: null },
                { id: 13, code: '5.1', name: 'تكاليف البضاعة المباعة', type: 'expense', parentId: 12 },
                { id: 14, code: '5.2', name: 'مصروفات تشغيلية', type: 'expense', parentId: 12 }
            ];
        }

        function saveData() {
            localStorage.setItem('erp_db_v3', JSON.stringify(db));
            if (typeof renderDashboard === 'function') renderDashboard();
        }

        // ========== لوحة التحكم المضمنة (إصلاح الشاشة البيضاء) ==========
        window.renderDashboard = function() {
            const section = document.getElementById('dashboard');
            if (!section) return;
            
            const totalCustomers = (db.customers || []).length;
            const totalSuppliers = (db.suppliers || []).length;
            const totalProducts = (db.inventory || []).length;
            const invoices = db.invoices || [];
            const totalInvoices = invoices.length;
            const totalSales = invoices.reduce((sum, inv) => sum + (Number(inv.total) || 0), 0);
            const totalPayments = (db.payments || []).reduce((sum, p) => sum + (Number(p.amount) || 0), 0);
            const lowStockItems = (db.inventory || []).filter(item => (Number(item.quantity) || 0) < 10).length;

            // أحدث الفواتير (آخر 5)
            const recentInvoices = [...invoices].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);

            section.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white rounded-xl shadow p-4 flex items-center gap-4">
                        <div class="p-3 bg-blue-100 rounded-full"><i data-lucide="users" class="text-blue-600" size="24"></i></div>
                        <div><p class="text-sm text-gray-500">العملاء</p><p class="text-2xl font-bold">${totalCustomers}</p></div>
                    </div>
                    <div class="bg-white rounded-xl shadow p-4 flex items-center gap-4">
                        <div class="p-3 bg-green-100 rounded-full"><i data-lucide="truck" class="text-green-600" size="24"></i></div>
                        <div><p class="text-sm text-gray-500">الموردين</p><p class="text-2xl font-bold">${totalSuppliers}</p></div>
                    </div>
                    <div class="bg-white rounded-xl shadow p-4 flex items-center gap-4">
                        <div class="p-3 bg-purple-100 rounded-full"><i data-lucide="package" class="text-purple-600" size="24"></i></div>
                        <div><p class="text-sm text-gray-500">المنتجات</p><p class="text-2xl font-bold">${totalProducts}</p></div>
                    </div>
                    <div class="bg-white rounded-xl shadow p-4 flex items-center gap-4">
                        <div class="p-3 bg-orange-100 rounded-full"><i data-lucide="file-text" class="text-orange-600" size="24"></i></div>
                        <div><p class="text-sm text-gray-500">الفواتير</p><p class="text-2xl font-bold">${totalInvoices}</p></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                    <div class="bg-white rounded-xl shadow p-5">
                        <h3 class="font-bold text-lg mb-4">ملخص المبيعات والتحصيلات</h3>
                        <div class="flex justify-around text-center">
                            <div><p class="text-sm text-gray-500">إجمالي المبيعات</p><p class="text-xl font-bold text-blue-600">${totalSales.toLocaleString()} ج.م</p></div>
                            <div><p class="text-sm text-gray-500">التحصيلات</p><p class="text-xl font-bold text-green-600">${totalPayments.toLocaleString()} ج.م</p></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow p-5">
                        <h3 class="font-bold text-lg mb-4">حالة المخزون</h3>
                        <div class="flex justify-around text-center">
                            <div><p class="text-sm text-gray-500">منتجات منخفضة</p><p class="text-xl font-bold text-red-600">${lowStockItems}</p></div>
                            <div><p class="text-sm text-gray-500">إجمالي المنتجات</p><p class="text-xl font-bold text-gray-800">${totalProducts}</p></div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow p-5 mb-6">
                    <h3 class="font-bold text-lg mb-4">أحدث الفواتير</h3>
                    ${recentInvoices.length === 0 ? '<p class="text-gray-500">لا توجد فواتير بعد</p>' : `
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead><tr class="bg-gray-50"><th class="p-2 text-right">رقم</th><th class="p-2 text-right">العميل</th><th class="p-2 text-right">التاريخ</th><th class="p-2 text-right">الإجمالي</th></tr></thead>
                            <tbody>
                                ${recentInvoices.map(inv => `
                                    <tr class="border-t">
                                        <td class="p-2">${inv.id || '-'}</td>
                                        <td class="p-2">${inv.customerName || 'عميل ' + (inv.customerId || '-')}</td>
                                        <td class="p-2">${inv.date || '-'}</td>
                                        <td class="p-2 font-semibold">${Number(inv.total || 0).toLocaleString()} ج.م</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>`}
                </div>

                <div class="bg-white rounded-xl shadow p-5">
                    <h3 class="font-bold text-lg mb-4">الرسم البياني للمخزون (أعلى 5 منتجات)</h3>
                    <div class="h-64">
                        <canvas id="inventoryChart"></canvas>
                    </div>
                </div>
            `;

            // رسم بياني للمخزون
            setTimeout(() => {
                const canvas = document.getElementById('inventoryChart');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                if (window.inventoryChartInstance) window.inventoryChartInstance.destroy();
                const topItems = [...(db.inventory || [])].sort((a, b) => (b.quantity || 0) - (a.quantity || 0)).slice(0, 5);
                window.inventoryChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: topItems.map(i => i.name || 'منتج'),
                        datasets: [{
                            label: 'الكمية',
                            data: topItems.map(i => i.quantity || 0),
                            backgroundColor: '#3b82f6'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            }, 100);

            lucide.createIcons();
        };

        // ========== نظام المستخدمين والصلاحيات ==========
        async function initUsersDB() {
            if (!localStorage.getItem(USERS_STORE_KEY)) {
                const defaultUsers = [
                    { id: 1, username: "admin", password: await hashPassword("123"), role: "admin" },
                    { id: 2, username: "sales_user", password: await hashPassword("456"), role: "sales" }
                ];
                ERP.saveUsersDB(defaultUsers);
            }
        }

       const ROLES_PERMISSIONS = {
    admin: ["dashboard", "customers", "suppliers", "inventory", "invoices", "payments", "accounting", "chartOfAccounts", "costs", "profit", "financialStatements", "monthlyClosing", "backup", "settings"],
    general_manager: ["dashboard", "customers", "suppliers", "inventory", "invoices", "payments", "accounting", "chartOfAccounts", "costs", "profit", "financialStatements", "monthlyClosing", "backup", "settings"],
    financial_manager: ["dashboard", "invoices", "payments", "accounting", "chartOfAccounts", "costs", "profit", "financialStatements", "monthlyClosing", "backup"],
    accountant: ["dashboard", "invoices", "payments", "accounting", "chartOfAccounts", "monthlyClosing"],
    sales_manager: ["dashboard", "customers", "inventory", "invoices", "payments", "profit", "costs"],
    sales: ["dashboard", "customers", "invoices"],
    inventory_manager: ["dashboard", "inventory", "costs", "profit", "suppliers"],
    purchase_manager: ["dashboard", "suppliers", "inventory", "invoices", "payments", "costs"],
    hr_manager: ["dashboard", "settings"],
    it_admin: ["dashboard", "backup", "settings"],
    data_entry: ["dashboard", "customers", "suppliers", "inventory", "invoices", "payments"]
};

        function login(username, password) {
            const users = ERP.getUsersDB();
            return hashPassword(password).then(hashedInput => {
                const user = users.find(u => u.username === username && u.password === hashedInput);
                if (!user) throw new Error('اسم المستخدم أو كلمة المرور غير صحيحة');
                const session = { userId: user.id, username: user.username, role: user.role };
                localStorage.setItem(AUTH_KEY, JSON.stringify(session));
                return session;
            });
        }

        function logout() {
            localStorage.removeItem(AUTH_KEY);
            document.getElementById('app-main').classList.add('app-hidden');
            document.getElementById('login-screen').classList.remove('app-hidden');
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
        }

        function getCurrentSession() {
            const session = localStorage.getItem(AUTH_KEY);
            return session ? JSON.parse(session) : null;
        }

        function getUserPermissions() {
            const session = getCurrentSession();
            if (!session) return [];
            return ROLES_PERMISSIONS[session.role] || [];
        }

        // ========== واجهة المستخدم والتنقل ==========
        const loginScreen = document.getElementById('login-screen');
        const appMain = document.getElementById('app-main');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const sidebarUsername = document.getElementById('sidebar-username');
        const logoutBtn = document.getElementById('logout-btn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            loginError.classList.add('hidden');
            try {
                await login(username, password);
                loginScreen.classList.add('app-hidden');
                appMain.classList.remove('app-hidden');
                updateUIAfterLogin();
            } catch (err) {
                loginError.textContent = err.message;
                loginError.classList.remove('hidden');
            }
        });

        logoutBtn.addEventListener('click', logout);

        function updateUIAfterLogin() {
            const session = getCurrentSession();
            if (!session) return;
            sidebarUsername.textContent = session.username;
            buildSidebar();
            const permissions = getUserPermissions();
            if (permissions.length > 0) {
                showSection(permissions[0]);  // عرض أول قسم مسموح به
            }
        }

        const sectionsConfig = {
            dashboard: { title: 'لوحة التحكم', icon: 'layout-dashboard' },
            customers: { title: 'العملاء', icon: 'users' },
            suppliers: { title: 'الموردين', icon: 'truck' },
            inventory: { title: 'المخزون', icon: 'package' },
            invoices: { title: 'الفواتير', icon: 'file-text' },
            payments: { title: 'السداد والتحصيل', icon: 'credit-card' },
            accounting: { title: 'القيود اليومية', icon: 'book-open' },
            chartOfAccounts: { title: 'شجرة الحسابات', icon: 'git-branch' },
            costs: { title: 'التكاليف والتقارير', icon: 'pie-chart' },
            profit: { title: 'أرباح المنتجات', icon: 'trending-up' },
            financialStatements: { title: 'القوائم المالية', icon: 'file-bar-chart' },
            monthlyClosing: { title: 'الإقفال الشهري', icon: 'calendar-check' },
            backup: { title: 'النسخ والبيانات', icon: 'database' },
            settings: { title: 'الإعدادات', icon: 'settings' }
        };

        function buildSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';
            const permissions = getUserPermissions();
            Object.keys(sectionsConfig).forEach(id => {
                if (permissions.includes(id)) {
                    const config = sectionsConfig[id];
                    const btn = document.createElement('button');
                    btn.className = 'sidebar-item w-full flex items-center p-2.5';
                    btn.id = 'btn-' + id;
                    btn.innerHTML = `<i data-lucide="${config.icon}" class="ml-3" size="18"></i> ${config.title}`;
                    btn.onclick = () => showSection(id);
                    nav.appendChild(btn);
                }
            });
            lucide.createIcons();
        }

        function showSection(id) {
            const permissions = getUserPermissions();
            if (!permissions.includes(id)) {
                alert('غير مصرح لك بدخول هذا القسم');
                return;
            }

            // إخفاء جميع الأقسام
            document.querySelectorAll('#main-content > section').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(id);
            if (target) target.classList.remove('hidden');

            // تفعيل الزر في الشريط
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + id);
            if (btn) btn.classList.add('active');

            document.getElementById('section-title').innerText = sectionsConfig[id]?.title || id;

            // خريطة أسماء دوال العرض
            const renderFuncMap = {
                dashboard: 'renderDashboard',
                customers: 'renderCustomers',
                suppliers: 'renderSuppliers',
                inventory: 'renderInventory',
                invoices: 'renderInvoices',
                payments: 'renderPayments',
                accounting: 'renderAccounting',
                chartOfAccounts: 'renderChartOfAccounts',
                costs: 'renderCosts',
                profit: 'renderProfit',
                financialStatements: 'renderFinancialStatements',
                monthlyClosing: 'renderMonthlyClosing',
                backup: 'renderBackup',
                settings: 'renderSettings'
            };

            const funcName = renderFuncMap[id];
            if (funcName && typeof window[funcName] === 'function') {
                try {
                    window[funcName]();
                } catch (e) {
                    console.error(`خطأ في تنفيذ ${funcName}:`, e);
                    if (target) target.innerHTML = '<p class="text-red-500 p-4">حدث خطأ أثناء تحميل القسم. راجع وحدة التحكم.</p>';
                }
            } else {
                console.warn(`دالة العرض ${funcName} غير معرفة.`);
                if (target) target.innerHTML = '<p class="text-center py-10 text-gray-500">الموديول غير متوفر حالياً</p>';
            }

            lucide.createIcons();
        }

        // دوال النوافذ المنبثقة
        function closeModal() { 
            document.getElementById('modal-overlay').classList.add('hidden'); 
            document.getElementById('modal-body').innerHTML = ''; 
        }
        function closeStatement() { document.getElementById('statement-overlay').classList.add('hidden'); }
        function closeInvoicePDF() { document.getElementById('invoice-pdf-overlay').classList.add('hidden'); }
        
        function printStatement() {
            const content = document.getElementById('statement-body').innerHTML;
            if (!content) return;
            const win = window.open('', '_blank', 'width=900,height=700');
            win.document.write(`<html dir="rtl"><head><title>كشف حساب</title><style>body{font-family:Cairo,sans-serif;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;text-align:right}</style></head><body>${content}</body></html>`);
            win.document.close();
            setTimeout(() => win.print(), 500);
        }
        
        function printInvoicePDF() {
            const content = document.getElementById('invoice-pdf-body').querySelector('.print-area');
            if (!content) return;
            const win = window.open('', '_blank', 'width=900,height=700');
            win.document.write(`<html dir="rtl"><head><title>فاتورة</title><style>body{font-family:Cairo,sans-serif;padding:20px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:8px;text-align:right}@media print{body{padding:0}}</style></head><body>${content.outerHTML}</body></html>`);
            win.document.close();
            setTimeout(() => win.print(), 500);
        }

        // إغلاق النوافذ عند النقر خارجها
        document.getElementById('modal-overlay')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
        document.getElementById('statement-overlay')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeStatement(); });
        document.getElementById('invoice-pdf-overlay')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeInvoicePDF(); });
        
        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('ar-EG', { dateStyle: 'full' }).format(new Date());
        lucide.createIcons();

        // بدء التشغيل
        window.addEventListener('DOMContentLoaded', async () => {
            await initUsersDB();
            const session = getCurrentSession();
            if (session) {
                loginScreen.classList.add('app-hidden');
                appMain.classList.remove('app-hidden');
                updateUIAfterLogin();
            } else {
                loginScreen.classList.remove('app-hidden');
                appMain.classList.add('app-hidden');
            }
        });
    </script>

    <script>
        // عرض القسم المناسب بعد تحميل الصفحة إذا كان المستخدم مسجلاً
        if (getCurrentSession()) {
            const permissions = getUserPermissions();
            if (permissions.includes('dashboard')) {
                showSection('dashboard');
            } else if (permissions.length > 0) {
                showSection(permissions[0]);
            }
        }
