<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System - نظام تخطيط موارد المؤسسات</title>
    
    <!-- المكتبات الخارجية -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- خطوط وأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- ملفات المشروع الأساسية -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="sidebar w-64 bg-[#0f172a] text-white flex flex-col transition-all duration-300 flex-shrink-0">
            <div class="p-5 text-center border-b border-slate-700/50">
                <h1 class="text-xl font-extrabold tracking-wide text-white">ERP System</h1>
                <p class="text-xs text-slate-400 mt-1">نظام تخطيط موارد المؤسسات</p>
                <p class="text-[10px] text-slate-500 mt-0.5">الإصدار 3.5.0 © 2026</p>
            </div>
            <nav class="flex-1 mt-4 px-3 space-y-1 overflow-y-auto">
                <button onclick="ERP.loadModule('dashboard')" class="sidebar-item w-full flex items-center p-2.5 active" id="btn-dashboard">
                    <i data-lucide="layout-dashboard" class="ml-3" size="18"></i> لوحة التحكم
                </button>
                <button onclick="ERP.loadModule('customers')" class="sidebar-item w-full flex items-center p-2.5" id="btn-customers">
                    <i data-lucide="users" class="ml-3" size="18"></i> العملاء
                </button>
                <button onclick="ERP.loadModule('suppliers')" class="sidebar-item w-full flex items-center p-2.5" id="btn-suppliers">
                    <i data-lucide="truck" class="ml-3" size="18"></i> الموردين
                </button>
                <button onclick="ERP.loadModule('inventory')" class="sidebar-item w-full flex items-center p-2.5" id="btn-inventory">
                    <i data-lucide="package" class="ml-3" size="18"></i> المخزون
                </button>
                <button onclick="ERP.loadModule('invoices')" class="sidebar-item w-full flex items-center p-2.5" id="btn-invoices">
                    <i data-lucide="file-text" class="ml-3" size="18"></i> الفواتير
                </button>
                <button onclick="ERP.loadModule('payments')" class="sidebar-item w-full flex items-center p-2.5" id="btn-payments">
                    <i data-lucide="credit-card" class="ml-3" size="18"></i> السداد والتحصيل
                </button>
                <button onclick="ERP.loadModule('accounting')" class="sidebar-item w-full flex items-center p-2.5" id="btn-accounting">
                    <i data-lucide="book-open" class="ml-3" size="18"></i> القيود اليومية
                </button>
                <button onclick="ERP.loadModule('chartOfAccounts')" class="sidebar-item w-full flex items-center p-2.5" id="btn-chartOfAccounts">
                    <i data-lucide="git-branch" class="ml-3" size="18"></i> شجرة الحسابات
                </button>
                <button onclick="ERP.loadModule('costs')" class="sidebar-item w-full flex items-center p-2.5" id="btn-costs">
                    <i data-lucide="pie-chart" class="ml-3" size="18"></i> التكاليف والتقارير
                </button>
                <button onclick="ERP.loadModule('profit')" class="sidebar-item w-full flex items-center p-2.5" id="btn-profit">
                    <i data-lucide="trending-up" class="ml-3" size="18"></i> أرباح المنتجات
                </button>
                <button onclick="ERP.loadModule('financialStatements')" class="sidebar-item w-full flex items-center p-2.5" id="btn-financialStatements">
                    <i data-lucide="file-bar-chart" class="ml-3" size="18"></i> القوائم المالية
                </button>
                <button onclick="ERP.loadModule('monthlyClosing')" class="sidebar-item w-full flex items-center p-2.5" id="btn-monthlyClosing">
                    <i data-lucide="calendar-check" class="ml-3" size="18"></i> الإقفال الشهري
                </button>
                <button onclick="ERP.loadModule('backup')" class="sidebar-item w-full flex items-center p-2.5" id="btn-backup">
                    <i data-lucide="database" class="ml-3" size="18"></i> النسخ والبيانات
                </button>
            </nav>
            <div class="p-3 border-t border-slate-700/50 text-center text-[10px] text-slate-500">
                ERP System v3.5 © 2026
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm z-10 p-3 px-5 flex justify-between items-center border-b border-gray-200 no-print">
                <div class="flex items-center gap-3">
                    <h2 id="section-title" class="text-lg font-bold text-gray-800">لوحة التحكم</h2>
                </div>
                <div class="flex items-center gap-3">
                    <span id="current-date" class="text-sm text-gray-500"></span>
                    <div class="h-9 w-9 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white shadow">
                        <i data-lucide="user" size="17"></i>
                    </div>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-5" id="main-content">
                <!-- المحتوى الديناميكي سيظهر هنا -->
            </div>
        </main>
    </div>

    <!-- Main Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden" style="max-height:92vh;">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 sticky top-0 z-10 rounded-t-2xl">
                <h3 id="modal-title" class="font-bold text-lg text-gray-800">إضافة جديد</h3>
                <button onclick="ERP.closeModal()" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-200 transition"><i data-lucide="x" size="20"></i></button>
            </div>
            <div id="modal-body" class="p-5 overflow-y-auto" style="max-height:60vh;"></div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-2 sticky bottom-0 rounded-b-2xl">
                <button onclick="ERP.closeModal()" class="px-5 py-2.5 text-gray-600 hover:bg-gray-200 rounded-lg transition font-semibold text-sm">إلغاء</button>
                <button id="modal-save-btn" class="btn-primary text-sm">حفظ</button>
            </div>
        </div>
    </div>

    <!-- Statement Modal -->
    <div id="statement-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden" style="max-height:92vh;">
            <div class="p-4 border-b flex justify-between items-center bg-gradient-to-r from-blue-50 to-indigo-50 sticky top-0 z-10 rounded-t-2xl">
                <h3 id="statement-title" class="font-bold text-lg text-gray-800">كشف حساب</h3>
                <button onclick="ERP.closeStatement()" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-200 transition"><i data-lucide="x" size="20"></i></button>
            </div>
            <div id="statement-body" class="p-5 overflow-y-auto" style="max-height:60vh;"></div>
            <div class="p-4 border-t bg-gray-50 flex justify-end rounded-b-2xl">
                <button onclick="ERP.printStatement()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold text-sm flex items-center gap-2 no-print">
                    <i data-lucide="printer" size="16"></i> طباعة
                </button>
                <button onclick="ERP.closeStatement()" class="px-5 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800 transition font-semibold text-sm mr-2">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- Invoice PDF Preview Modal -->
    <div id="invoice-pdf-overlay" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden" style="max-height:92vh;">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 sticky top-0 z-10 rounded-t-2xl">
                <h3 class="font-bold text-lg text-gray-800">معاينة الفاتورة</h3>
                <button onclick="ERP.closeInvoicePDF()" class="text-gray-400 hover:text-gray-600 p-1 rounded-full hover:bg-gray-200 transition"><i data-lucide="x" size="20"></i></button>
            </div>
            <div id="invoice-pdf-body" class="p-5 overflow-y-auto bg-white" style="max-height:60vh;"></div>
            <div class="p-4 border-t bg-gray-50 flex justify-end gap-2 rounded-b-2xl">
                <button onclick="ERP.printInvoicePDF()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-semibold text-sm flex items-center gap-2"><i data-lucide="printer" size="16"></i> طباعة / حفظ PDF</button>
                <button onclick="ERP.closeInvoicePDF()" class="px-5 py-2 bg-slate-700 text-white rounded-lg hover:bg-slate-800 transition font-semibold text-sm">إغلاق</button>
            </div>
        </div>
    </div>

    <!-- ملفات JavaScript الأساسية -->
    <script src="js/app.js"></script>
    <script>
        // تحميل dashboard تلقائياً عند فتح التطبيق
        document.addEventListener('DOMContentLoaded', () => {
            ERP.loadModule('dashboard');
            document.getElementById('current-date').innerText = new Intl.DateTimeFormat('ar-EG', { dateStyle: 'full' }).format(new Date());
        });
    </script>
</body>
</html>
<script src="modules/customers.js"></script>
<script src="modules/customers.js"></script>
